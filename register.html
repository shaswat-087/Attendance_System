<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Sign In</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <header>
    <h1>SMART ATTENDANCE SYSTEM</h1>
    <p class="ehc"> Register Portal For School Students </p>
  </header>
  
   

  <form method="POST" action="/calculate">
    <div class="details">
    <h2>Enter Details</h2>
    
    <label for="Username"><b> Full Name</b> </label>
    <input type="text" id="Username" name="Username" placeholder="Enter Full Name" required>
  
    <div class="class"><span><b> Class </b> </span> 
    <select name="class" required>
      <option value="" disabled selected hidden> Select Class </option>
      <option value="1">  1 </option>
      <option value="2"> 2</option>
      <option value="3"> 3 </option>
      <option value="4"> 4 </option>
      <option value="5">  5 </option>
      <option value="6"> 6</option>
      <option value="7"> 7 </option>
      <option value="8"> 8 </option>
      <option value="5">  9 </option>
      <option value="6"> 10 </option>
      <option value="7"> 11 </option>
      <option value="8"> 12 </option>
     </select>
    </div>
    
    <div class="section"><span><b>Section</b> </span> 
    <select name="section" required>
      <option value="" disabled selected hidden> Select Section</option>
      <option value="A">  A </option>
      <option value="B"> B</option>
      <option value="C"> C </option>
      <option value="D"> D </option>
      
      
    </select>
    </div>
     
    <label for="Roll"><b> Roll Number </b></label>
    <input type="text" id="Roll" name="Roll" placeholder="Enter Roll No. " required>
    
    <label for="Classroom"> <b>Room No. of your current class</b> </label>
    <input type="text" id="Classroom" name="Classroom" placeholder="Enter Classroom No. (eg - NAB303) " required>
   
     <label for="image"> <b> Upload Passport size photo</b></label>
      <input type="file" id="image" name="image">

    
 
    <div class="type"> <span><b> Stream (only for 10+2 students)</b> </span>
    <select name="type">
      <option value="" disabled selected hidden> Select Stream </option>
      <option value="Science">  Science </option>
      <option value="Arts"> Arts </option>
      <option value="Commerce"> Commerce </option>
     </div>
      
    </select><br><br>
    </div>
    <input class="calculate" type="submit" value="Submit">
  </form>
   
  
  

  
  <div class="footer">
    <p>© 2026 Team  Vision Nexus</p>
  </div>
</body>
</html>
