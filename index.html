<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance System</title>
    <link rel="stylesheet" href="style1.css">

    
</head>

<body>
    <header>
        <h1> SMART ATTENDANCE SYSTEM </h1>
    </header>
    <div class="container">
        <div class="camera-section">
            <div class="video-section">
                <div class="line"></div>
                <video autoplay></video>
            </div>

            <button class="capture">Capture Attendance</button>


            
        </div>
        <div class="result-section">

            <div class="result"><h2>Recognition Result</h2></div>

            <div class="info">
                <p><span>Student Name:</span> --</p>
                <p><span>Roll Number:</span> --</p>
                <p><span>Class:</span> --</p>
                <p><span>Section:</span> --</p>
            </div>

            <div class="status">
                <p>Waiting for input...</p>
            </div>

        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
